<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{% block title %}TimetableAI{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static',filename='css/style.css') }}"/>
</head>
<body class="dark">
<nav class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">T</div>
    <span>TimetableAI</span>
  </div>
  <ul class="nav-links">
    <li class="{{ 'active' if page=='dashboard' }}">
      <a href="/dashboard">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        <span>Dashboard</span>
      </a>
    </li>
    <li class="{{ 'active' if page=='data_entry' }}">
      <a href="/data-entry">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        <span>Data entry</span>
      </a>
    </li>
    <li class="{{ 'active' if page=='constraints' }}">
      <a href="/constraints">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        <span>Constraints</span>
      </a>
    </li>
    <li class="{{ 'active' if page=='run_scheduler' }}">
      <a href="/run-scheduler">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span>Run</span>
      </a>
    </li>
    <li class="{{ 'active' if page=='timetable' }}">
      <a href="/timetable">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>Timetable</span>
      </a>
    </li>
    <li class="{{ 'active' if page=='export' }}">
      <a href="/export">
        <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Export</span>
      </a>
    </li>
  </ul>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">☀ Light mode</button>
</nav>
<main class="main">
  <header class="topbar">
    <h1 class="page-title">{% block page_title %}{% endblock %}</h1>
    <div class="topbar-right">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Loading...</span>
    </div>
  </header>
  <div class="content">{% block content %}{% endblock %}</div>
</main>
<script src="{{ url_for('static',filename='js/main.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
